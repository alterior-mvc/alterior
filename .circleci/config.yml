# kick: 1

version: 2.1

commands:
  run_tests:
    description: "Build Alterior and run the test suite"
    parameters:
      version:
        type: string
    steps:
      - checkout
      - run: sudo npm install npm@9 -g
      - restore_cache:
          keys:
          - v2-dependencies-<< parameters.version >>-{{ checksum "package.json" }}
          - v2-dependencies-<< parameters.version >>-
      - run: npm install
      - save_cache:
          paths:
            - node_modules
          key: v2-dependencies-<< parameters.version >>-{{ checksum "package.json" }}
      - run: npm run bootstrap
      - run: npm run build -- --unattended --serial
      - run: npm test -- --unattended --serial
jobs:
  node-26:
    docker:
      - image: cimg/node:26.1
    working_directory: ~/repo
    steps:
      - run_tests:
          version: "24"
  node-24:
    docker:
      - image: cimg/node:24.15
    working_directory: ~/repo
    steps:
      - run_tests:
          version: "24"
  node-22:
    docker:
      - image: cimg/node:22.22
    working_directory: ~/repo
    steps:
      - run_tests:
          version: "22"
  node-16:
    docker:
      - image: cimg/node:16.19
    working_directory: ~/repo
    steps:
      - run_tests:
          version: "16"

workflows:
  build:
    jobs:
      - node-21
      - node-20
      - node-18
      - node-16
